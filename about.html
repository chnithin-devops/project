    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap");
      :root { color-scheme: dark; } * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; overflow: hidden; color: #f8fbff; font-family: "Space Grotesk", system-ui, sans-serif; background: #0b1020; }
      .orb { position: fixed; width: 34rem; height: 34rem; border-radius: 50%; filter: blur(30px); opacity: .55; pointer-events: none; animation: drift 12s ease-in-out infinite alternate; }
      .one { top: -18rem; left: -12rem; background: #7c3aed; } .two { right: -13rem; bottom: -18rem; background: #0891b2; animation-delay: -5s; }
      main { position: relative; width: min(92vw, 760px); padding: clamp(2.2rem, 7vw, 5rem); border: 1px solid rgba(255,255,255,.16); border-radius: 28px; text-align: center; background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.045)); box-shadow: 0 26px 80px rgba(0,0,0,.38), inset 0 1px rgba(255,255,255,.12); backdrop-filter: blur(18px); animation: arrive .8s cubic-bezier(.2,.8,.2,1) both; }
      nav { display: flex; justify-content: center; gap: .45rem; margin-bottom: 3.5rem; } nav a { padding: .55rem .9rem; border-radius: 999px; color: #cbd5e1; font: 500 .78rem/1 "DM Mono", monospace; text-decoration: none; transition: background .2s, color .2s; } nav a:hover, nav a[aria-current="page"] { color: #fff; background: rgba(255,255,255,.12); }
      .eyebrow { margin: 0 0 1.25rem; color: #a5f3fc; font: 500 .78rem/1 "DM Mono", monospace; letter-spacing: .16em; text-transform: uppercase; } h1 { margin: 0; font-size: clamp(3rem, 10vw, 6rem); line-height: .95; letter-spacing: -.07em; background: linear-gradient(115deg, #fff 20%, #c4b5fd 47%, #67e8f9 82%); -webkit-background-clip: text; background-clip: text; color: transparent; } p { max-width: 37rem; margin: 1.8rem auto 0; color: #cbd5e1; font-size: clamp(1rem, 2.4vw, 1.2rem); line-height: 1.65; } .highlight { color: #fff; } @keyframes arrive { from { opacity: 0; transform: translateY(22px) scale(.97); } to { opacity: 1; transform: none; } } @keyframes drift { to { transform: translate(5rem, 3rem) scale(1.15); } } @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; } }
    </style>
