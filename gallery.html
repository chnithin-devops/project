<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <title>Gallery — Nithin</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap");
      :root { color-scheme: dark; } * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; padding: 3rem 1rem; color: #f8fbff; font-family: "Space Grotesk", system-ui, sans-serif; background: #0b1020; }
      .orb { position: fixed; z-index: -1; width: 34rem; height: 34rem; border-radius: 50%; filter: blur(30px); opacity: .5; pointer-events: none; animation: drift 12s ease-in-out infinite alternate; } .one { top: -18rem; left: -12rem; background: #7c3aed; } .two { right: -13rem; bottom: -18rem; background: #0891b2; animation-delay: -5s; }
      main { width: min(92vw, 980px); margin: auto; padding: clamp(1.6rem, 5vw, 3.5rem); border: 1px solid rgba(255,255,255,.16); border-radius: 28px; background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.045)); box-shadow: 0 26px 80px rgba(0,0,0,.38), inset 0 1px rgba(255,255,255,.12); backdrop-filter: blur(18px); animation: arrive .8s cubic-bezier(.2,.8,.2,1) both; }
      nav { display: flex; flex-wrap: wrap; justify-content: center; gap: .45rem; margin-bottom: 3.5rem; } nav a { padding: .55rem .9rem; border-radius: 999px; color: #cbd5e1; font: 500 .78rem/1 "DM Mono", monospace; text-decoration: none; transition: background .2s, color .2s; } nav a:hover, nav a[aria-current="page"] { color: #fff; background: rgba(255,255,255,.12); }
      .eyebrow { margin: 0 0 1.1rem; color: #a5f3fc; font: 500 .78rem/1 "DM Mono", monospace; letter-spacing: .16em; text-align: center; text-transform: uppercase; } h1 { margin: 0; font-size: clamp(3rem, 9vw, 6rem); line-height: .95; letter-spacing: -.07em; text-align: center; background: linear-gradient(115deg, #fff 20%, #c4b5fd 47%, #67e8f9 82%); -webkit-background-clip: text; background-clip: text; color: transparent; } .intro { max-width: 34rem; margin: 1.5rem auto 2.5rem; color: #cbd5e1; text-align: center; line-height: 1.65; }
      .grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 120px; gap: 1rem; } .card { position: relative; overflow: hidden; display: flex; align-items: end; padding: 1.1rem; border: 1px solid rgba(255,255,255,.13); border-radius: 18px; color: #fff; font-size: 1.1rem; font-weight: 600; isolation: isolate; transition: transform .25s ease, border-color .25s ease; } .card:hover { z-index: 1; transform: translateY(-5px); border-color: rgba(255,255,255,.45); } .card::before { position: absolute; z-index: -1; content: ""; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(255,255,255,.35), transparent 32%), var(--gradient); transition: transform .35s ease; } .card:hover::before { transform: scale(1.1); } .card small { display: block; margin-top: .25rem; color: rgba(255,255,255,.78); font: .7rem "DM Mono", monospace; } .a { grid-column: span 7; grid-row: span 2; --gradient: linear-gradient(135deg, #5b21b6, #0891b2); } .b { grid-column: span 5; --gradient: linear-gradient(135deg, #be185d, #7c3aed); } .c { grid-column: span 5; --gradient: linear-gradient(135deg, #0f766e, #38bdf8); } .d { grid-column: span 4; --gradient: linear-gradient(135deg, #b45309, #f43f5e); } .e { grid-column: span 8; --gradient: linear-gradient(135deg, #1e3a8a, #7c3aed); } @keyframes arrive { from { opacity: 0; transform: translateY(22px) scale(.97); } to { opacity: 1; transform: none; } } @keyframes drift { to { transform: translate(5rem, 3rem) scale(1.15); } } @media (max-width: 580px) { .grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 135px; } .card, .a, .b, .c, .d, .e { grid-column: span 1; grid-row: span 1; } .a, .e { grid-column: span 2; } } @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; } }
    </style>
  </head>
  <body>
    <div class="orb one"></div><div class="orb two"></div>
    <main>
      <nav aria-label="Main navigation"><a href="index.html">Home</a><a href="about.html">About</a><a href="gallery.html" aria-current="page">Gallery</a><a href="contact.html">Contact</a></nav>
      <p class="eyebrow">Selected moments</p>
      <h1>Gallery.</h1>
      <p class="intro">A small collection of colorful ideas, experiments, and places to wander.</p>
      <section class="grid" aria-label="Gallery collection">
        <article class="card a">Dreamscape<small>01 / explorations</small></article>
        <article class="card b">Afterglow<small>02 / color study</small></article>
        <article class="card c">Tidal<small>03 / motion</small></article>
        <article class="card d">Ember<small>04 / warmth</small></article>
        <article class="card e">Blue hour<small>05 / quiet focus</small></article>
      </section>
    </main>
  </body>
</html>
