<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1020" />
    <title>Hello, World!</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #f8fbff;
        font-family: "Space Grotesk", system-ui, sans-serif;
        background: #0b1020;
      }
      .orb {
        position: fixed;
        width: 34rem;
        height: 34rem;
        border-radius: 50%;
        filter: blur(30px);
        opacity: .55;
        pointer-events: none;
        animation: drift 12s ease-in-out infinite alternate;
      }
      .orb.one { top: -18rem; left: -12rem; background: #7c3aed; }
      .orb.two { right: -13rem; bottom: -18rem; background: #0891b2; animation-delay: -5s; }
      main {
        position: relative;
        width: min(92vw, 760px);
        padding: clamp(2.2rem, 7vw, 5rem);
        border: 1px solid rgba(255,255,255,.16);
        border-radius: 28px;
        text-align: center;
        background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.045));
        box-shadow: 0 26px 80px rgba(0,0,0,.38), inset 0 1px rgba(255,255,255,.12);
        backdrop-filter: blur(18px);
        animation: arrive .8s cubic-bezier(.2,.8,.2,1) both;
      }
      .eyebrow {
        margin: 0 0 1.25rem;
        color: #a5f3fc;
        font: 500 .78rem/1 "DM Mono", monospace;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(3.2rem, 11vw, 7.3rem);
        line-height: .9;
        letter-spacing: -.07em;
        background: linear-gradient(115deg, #fff 20%, #c4b5fd 47%, #67e8f9 82%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        max-width: 37rem;
        margin: 1.8rem auto 0;
        color: #cbd5e1;
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.65;
      }
      .spark { display: inline-block; animation: spin 4s linear infinite; }
      .status {
        display: inline-flex;
        gap: .55rem;
        align-items: center;
        margin-top: 2.25rem;
        padding: .7rem 1rem;
        border: 1px solid rgba(165,243,252,.25);
        border-radius: 999px;
        background: rgba(8,145,178,.1);
        color: #cffafe;
        font: 400 .78rem/1 "DM Mono", monospace;
      }
      .dot { width: .55rem; height: .55rem; border-radius: 50%; background: #5eead4; box-shadow: 0 0 14px #5eead4; }
      @keyframes arrive { from { opacity: 0; transform: translateY(22px) scale(.97); } to { opacity: 1; transform: none; } }
      @keyframes drift { to { transform: translate(5rem, 3rem) scale(1.15); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; } }
    </style>
  </head>
  <body>
    <div class="orb one"></div><div class="orb two"></div>
    <main>
      <p class="eyebrow">A fresh beginning</p>
      <h1>Hello, World<span class="spark">!</span></h1>
      <p>Your next great idea starts with a single line of code. Make it bright, make it yours, and ship it.</p>
      <div class="status"><span class="dot"></span> Ready to create</div>
    </main>
  </body>
</html>
